name: Kaggle 自动备份到 GitHub
on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨 0 点自动运行（UTC时间，对应北京时间早8点）
  workflow_dispatch:  # 支持手动触发（测试用）

jobs:
  backup-kaggle-content:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取 GitHub 仓库到 Actions 服务器
      - name: 克隆 GitHub 仓库
        uses: actions/checkout@v4

      # 2. 配置 Python 环境（Kaggle CLI 依赖 Python）
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装 Kaggle 官方库
      - name: 安装 Kaggle CLI
        run: |
          pip install kaggle --upgrade

      # 4. 配置 Kaggle 凭证（使用你存的 Secrets）
      - name: 配置 Kaggle API Token
        run: |
          # 创建 Kaggle 配置目录
          mkdir -p ~/.kaggle
          # 生成 kaggle.json 文件（核心：调用你存的 Secrets）
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_API_KEY }}"}' > ~/.kaggle/kaggle.json
          # 设置文件权限（Kaggle 要求必须是 600，否则报错）
          chmod 600 ~/.kaggle/kaggle.json
      # 5. 拉取 Kaggle 内容（Notebook/数据集） - 【修复后的兼容版本】
      - name: 拉取 Kaggle Notebook 到 GitHub
        run: |
          # 创建备份目录
          mkdir -p ./kaggle-backup/notebooks
          mkdir -p ./kaggle-backup/datasets

          # ========== 替换这里 ==========
          # 替换为你的 Kaggle 用户名
          KAGGLE_USER="Friedmk"

          echo "开始拉取 Kaggle Notebook..."
          # 使用兼容写法：不指定 --output，直接 grep 过滤 ref 字段
          # 这行命令能兼容新旧版本的 Kaggle CLI
          kaggle kernels list --user $KAGGLE_USER | grep -E "^ref" | awk '{print $2}' | while read kernel; do
            if [ -n "$kernel" ]; then
              kaggle kernels pull $kernel -p ./kaggle-backup/notebooks --force
              echo "成功拉取 Notebook: $kernel"
            fi
          done

          echo "开始拉取 Kaggle 数据集..."
          # 数据集列表同样使用兼容写法
          kaggle datasets list --user $KAGGLE_USER | grep -v "ref" | awk '{print $1}' | while read dataset; do
            if [ -n "$dataset" ]; then
              kaggle datasets download $dataset -p ./kaggle-backup/datasets --unzip --force
              echo "成功拉取数据集: $dataset"
            fi
          done

          # （可选）拉取你所有的 Kaggle 数据集
          echo "开始拉取 Kaggle 数据集..."
          kaggle datasets list --user $KAGGLE_USER --output csv | grep -v "ref" | cut -d',' -f1 | while read dataset; do
            if [ -n "$dataset" ]; then
              kaggle datasets download $dataset -p ./kaggle-backup/datasets --unzip --force
              echo "成功拉取数据集: $dataset"
            fi
          done

      # 6. 把拉取的内容推回 GitHub 仓库
      - name: 提交并推送备份内容
        run: |
          # ========== 替换这里 ==========
          git config --global user.name "Fried-MK"
          git config --global user.email "hjc521016@qq.com"

          # 检查是否有新内容
          git add ./kaggle-backup/
          if git diff --cached --quiet; then
            echo "没有新的 Kaggle 内容需要备份"
            exit 0
          fi

          # 提交并推送
          git commit -m "Kaggle 自动备份: $(date +'%Y-%m-%d %H:%M:%S')"
          # 调用 GitHub PAT 推送（使用你存的 GH_PAT Secret）
          git push https://${{ secrets.GH_PAT }}@github.com/Fried-MK/Kaggle.git HEAD:main
